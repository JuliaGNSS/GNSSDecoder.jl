name: Test
on:
  push:
    branches:
      - 'master'
    tags: ['*']
  pull_request:
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        version:
          - '1.10'
          - '1'
          #- 'nightly'
        os:
          - ubuntu-latest
        # Windows is intentionally excluded: the Aff3ct dependency has no
        # Windows binary (aff3ct/streampu does not build on MinGW, so
        # aff3ct_jll skips Windows), so the package cannot be installed there.
        include:
          # macOS is tested on Julia 1 only (keeps the matrix small). Requires
          # aff3ct_jll ≥ 4.2.2, which fixed a case-insensitive-APFS install
          # failure ("Tree Hash Mismatch") present in v4.2.1 —
          # JuliaPackaging/Yggdrasil#13903.
          - os: macOS-latest
            version: '1'
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          plugins: noop
          disable_search: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
  integration:
    # Real-data decode of the Fraunhofer Flexiband III-7a capture
    # (test/flexiband_iii7a.jl) — the same real-sky recording Tracking.jl uses.
    # Gated behind GNSSDECODER_RUN_INTEGRATION_TEST so it only runs here; it
    # downloads the 1.6 GB capture (cached between runs — note GitHub caches are
    # per-repository, so this is GNSSDecoder's own cache, not shared with
    # Tracking.jl), then tracks + decodes GPS L1 C/A, Galileo E1B and GPS L5I.
    name: Integration (real-data decode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'
      - uses: julia-actions/cache@v3
      - name: Cache Flexiband III-7a capture (1.6 GB)
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/flexiband
          key: flexiband-iii7a-short-v1
      - uses: julia-actions/julia-runtest@v1
        env:
          GNSSDECODER_RUN_INTEGRATION_TEST: 'true'
          GNSSDECODER_TESTDATA_DIR: ${{ runner.temp }}/flexiband