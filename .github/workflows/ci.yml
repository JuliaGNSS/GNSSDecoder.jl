name: Test
on:
  push:
    branches:
      - 'master'
    tags: ['*']
  pull_request:
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        version:
          - '1.10'
          - '1'
          #- 'nightly'
        os:
          - ubuntu-latest
        # Windows is intentionally excluded: the Aff3ct dependency has no
        # Windows binary (aff3ct/streampu does not build on MinGW, so
        # aff3ct_jll skips Windows), so the package cannot be installed there.
        include:
          # macOS is tested on Julia 1 only (keeps the matrix small). Requires
          # aff3ct_jll ≥ 4.2.2, which fixed a case-insensitive-APFS install
          # failure ("Tree Hash Mismatch") present in v4.2.1 —
          # JuliaPackaging/Yggdrasil#13903.
          - os: macOS-latest
            version: '1'
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          plugins: noop
          disable_search: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
  integration:
    # Real-data decode of the Fraunhofer Flexiband L125 capture (test/flexiband_l125.jl).
    # Gated behind GNSSDECODER_RUN_INTEGRATION_TEST so it only runs here; it
    # HTTP range-fetches ~680 MB of the capture (cached between runs), then
    # tracks + decodes and asserts validated GPS L1 C/A navigation data.
    name: Integration (real-data decode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'
      - uses: julia-actions/cache@v3
      - name: Cache Flexiband L125 prefix (~680 MB)
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/flexiband
          key: flexiband-l125-210s-l1-prefix-v1
      - uses: julia-actions/julia-runtest@v1
        env:
          GNSSDECODER_RUN_INTEGRATION_TEST: 'true'
          GNSSDECODER_TESTDATA_DIR: ${{ runner.temp }}/flexiband