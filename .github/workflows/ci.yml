name: Test
on:
  push:
    branches:
      - 'master'
    tags: ['*']
  pull_request:
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        version:
          - '1.10'
          - '1'
          #- 'nightly'
        os:
          - ubuntu-latest
        # Windows is intentionally excluded: the Aff3ct dependency has no
        # Windows binary (aff3ct/streampu does not build on MinGW, so
        # aff3ct_jll skips Windows), so the package cannot be installed there.
        #
        # macOS is temporarily excluded: aff3ct_jll v4.2.1 fails to install on
        # macOS (case-insensitive APFS collapses a case-only-differing filename
        # in aff3ct's bundled share/conf data, giving an artifact "Tree Hash
        # Mismatch"). Fixed by aff3ct_jll v4.2.2 — JuliaPackaging/Yggdrasil#13903.
        # Re-add `macOS-latest` once 4.2.2 is published.
        # include:
        #   - os: macOS-latest
        #     version: '1'
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          plugins: noop
          disable_search: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}